<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <title>Galaksay — Sayılar Evrenin Dilidir</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
      ::selection { background: rgba(108,99,255,.35); color: #fff; }
      ::-moz-selection { background: rgba(108,99,255,.35); color: #fff; }
      button, [role="button"] { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
      input, textarea { -webkit-tap-highlight-color: transparent; }

      /* ═══ CORE ANIMATIONS ═══ */
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
      @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
      @keyframes bounceIn { 0% { transform: scale(0); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
      @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
      @keyframes sparkle { 0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); } 50% { opacity: 1; transform: scale(1) rotate(180deg); } }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

      /* ═══ ENHANCED SPACE ANIMATIONS ═══ */
      @keyframes warpSpeed {
        0% { transform: scale(1); filter: blur(0); }
        30% { transform: scale(1.05); filter: blur(2px); }
        60% { transform: scale(0.95); filter: blur(4px); }
        100% { transform: scale(1); filter: blur(0); }
      }
      @keyframes starTwinkle {
        0%, 100% { opacity: 0.3; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1.2); }
      }
      @keyframes planetOrbit {
        0% { transform: rotate(0deg) translateX(8px) rotate(0deg); }
        100% { transform: rotate(360deg) translateX(8px) rotate(-360deg); }
      }
      @keyframes cosmicGlow {
        0%, 100% { box-shadow: 0 0 12px var(--glow-color, rgba(124,58,237,.3)); }
        50% { box-shadow: 0 0 28px var(--glow-color, rgba(124,58,237,.5)), 0 0 60px var(--glow-color, rgba(124,58,237,.15)); }
      }
      @keyframes slideInRight {
        from { opacity: 0; transform: translateX(30px); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes slideInLeft {
        from { opacity: 0; transform: translateX(-30px); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes fadeOutScale {
        from { opacity: 1; transform: scale(1); }
        to { opacity: .3; transform: scale(.85); }
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes correctPulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.08); }
        100% { transform: scale(1); }
      }
      @keyframes wrongShake {
        0%, 100% { transform: translateX(0) rotate(0); }
        20% { transform: translateX(-6px) rotate(-1deg); }
        40% { transform: translateX(6px) rotate(1deg); }
        60% { transform: translateX(-4px) rotate(-0.5deg); }
        80% { transform: translateX(4px) rotate(0.5deg); }
      }
      @keyframes confetti {
        0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
        100% { transform: translateY(85vh) rotate(720deg) scale(0.3); opacity: 0; }
      }
      @keyframes confettiBig {
        0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
        50% { opacity: 0.9; }
        100% { transform: translateY(90vh) rotate(1080deg) scale(0.2); opacity: 0; }
      }
      @keyframes missionBriefSlide {
        from { opacity: 0; transform: translateY(-10px) scale(0.98); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }
      @keyframes crystalRotate {
        0% { transform: rotateY(0deg) scale(1); }
        25% { transform: rotateY(90deg) scale(1.1); }
        50% { transform: rotateY(180deg) scale(1); }
        75% { transform: rotateY(270deg) scale(1.1); }
        100% { transform: rotateY(360deg) scale(1); }
      }

      /* ═══ GUIDE CHARACTER ANIMATIONS ═══ */
      @keyframes guideBreathe {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-3px); }
      }
      @keyframes guideHappy {
        0%, 100% { transform: translateY(0) scale(1); }
        25% { transform: translateY(-8px) scale(1.05); }
        50% { transform: translateY(-4px) scale(1.02); }
        75% { transform: translateY(-6px) scale(1.04); }
      }
      @keyframes guideSad {
        0%, 100% { transform: translateY(0) rotate(0); }
        50% { transform: translateY(2px) rotate(-3deg); }
      }
      @keyframes guideWave {
        0%, 100% { transform: rotate(-10deg); }
        50% { transform: rotate(-45deg); }
      }
      @keyframes bubblePop {
        from { opacity: 0; transform: scale(0.85) translateY(6px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
      }
      @keyframes twinkle {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }

      /* ═══ GAME FLOW ANIMATIONS ═══ */
      @keyframes numberReveal {
        from { opacity: 0; transform: scale(0.5) translateY(10px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
      }
      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      @keyframes trophy {
        0% { transform: scale(0) rotate(-180deg); }
        50% { transform: scale(1.2) rotate(10deg); }
        100% { transform: scale(1) rotate(0deg); }
      }
      @keyframes rewardReveal {
        from { opacity: 0; transform: translateY(15px) scale(0.95); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }
      @keyframes fragmentCollect {
        0% { transform: scale(0) rotate(-90deg); }
        50% { transform: scale(1.3) rotate(10deg); }
        100% { transform: scale(1) rotate(0deg); }
      }
      @keyframes fragmentFloat {
        0% { opacity: 0; transform: translateY(10px); }
        30% { opacity: 1; transform: translateY(-8px); }
        100% { opacity: 0; transform: translateY(-20px); }
      }
      @keyframes shipUpgrade {
        0% { transform: scale(1); filter: brightness(1); }
        50% { transform: scale(1.4); filter: brightness(1.5) drop-shadow(0 0 12px rgba(251,191,36,.6)); }
        100% { transform: scale(1); filter: brightness(1); }
      }
      @keyframes levelUpGlow {
        0%, 100% { box-shadow: 0 4px 20px var(--glow-color, rgba(124,58,237,.3)); }
        50% { box-shadow: 0 6px 30px var(--glow-color, rgba(124,58,237,.5)), 0 0 50px var(--glow-color, rgba(124,58,237,.2)); }
      }
      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      @keyframes rainbowBg {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      @keyframes correctPulseRing {
        0% { transform: scale(0.5); opacity: 0.8; }
        100% { transform: scale(3); opacity: 0; }
      }
      @keyframes starBurst {
        0% { opacity: 1; transform: rotate(var(--angle,0deg)) translateY(0); }
        100% { opacity: 0; transform: rotate(var(--angle,0deg)) translateY(-80px) scale(0.3); }
      }

      /* ═══ JOURNEY MAP ANIMATIONS ═══ */
      @keyframes mapBounce {
        0%, 100% { transform: translate(-50%,-50%) scale(1); }
        50% { transform: translate(-50%,-50%) scale(1.08); }
      }
      @keyframes mapFloat {
        0%, 100% { transform: translate(-50%,-55%); }
        50% { transform: translate(-50%,-58%); }
      }
      @keyframes currentGlow {
        0%, 100% { opacity: 0.4; transform: translate(-50%,-55%) scale(1); }
        50% { opacity: 0.8; transform: translate(-50%,-55%) scale(1.06); }
      }
      @keyframes starCoreGlow {
        0%, 100% { filter: brightness(1); }
        50% { filter: brightness(1.2); }
      }
      @keyframes pathDash {
        to { stroke-dashoffset: -20; }
      }

      /* ═══ TYPEWRITER EFFECT ═══ */
      @keyframes typewriter {
        from { width: 0; }
        to { width: 100%; }
      }
      @keyframes blink-caret {
        from, to { border-color: transparent; }
        50% { border-color: #a78bfa; }
      }
      .typewriter-text {
        overflow: hidden;
        white-space: nowrap;
        border-right: 2px solid #a78bfa;
        width: 0;
        animation: typewriter 2.5s steps(28, end) 0.5s forwards, blink-caret 0.75s step-end infinite;
        display: inline-block;
      }

      /* ═══ ROCKET LAUNCH ═══ */
      @keyframes rocketFloat {
        0%, 100% { transform: translateY(0) rotate(-2deg); }
        25% { transform: translateY(-8px) rotate(0deg); }
        50% { transform: translateY(-4px) rotate(2deg); }
        75% { transform: translateY(-10px) rotate(0deg); }
      }
      @keyframes rocketLaunch {
        0% { transform: translateY(0) scale(1); opacity: 1; }
        60% { transform: translateY(-120px) scale(1.1); opacity: 1; }
        100% { transform: translateY(-300px) scale(0.3); opacity: 0; }
      }
      @keyframes exhaust {
        0% { opacity: 0.8; transform: scaleY(1) scaleX(1); }
        50% { opacity: 0.4; transform: scaleY(1.5) scaleX(0.8); }
        100% { opacity: 0; transform: scaleY(2) scaleX(0.4); }
      }

      /* ═══ CARD REVEAL ═══ */
      @keyframes cardFlip {
        0% { transform: perspective(600px) rotateY(180deg) scale(0.8); opacity: 0; }
        50% { transform: perspective(600px) rotateY(90deg) scale(1.05); }
        100% { transform: perspective(600px) rotateY(0deg) scale(1); opacity: 1; }
      }
      @keyframes cardShine {
        0% { left: -100%; }
        50% { left: 100%; }
        100% { left: 100%; }
      }

      /* ═══ CAPTAIN'S LOG ═══ */
      @keyframes logSlideIn {
        from { opacity: 0; transform: translateX(-20px) scale(0.95); }
        to { opacity: 1; transform: translateX(0) scale(1); }
      }
      @keyframes logPulse {
        0%, 100% { box-shadow: 0 0 8px rgba(251,191,36,.15); }
        50% { box-shadow: 0 0 20px rgba(251,191,36,.3), 0 0 40px rgba(251,191,36,.1); }
      }

      /* ═══ PARTICLE BURST ═══ */
      @keyframes particleFly {
        0% { transform: translate(0, 0) scale(1); opacity: 1; }
        100% { transform: translate(var(--px, 50px), var(--py, -80px)) scale(0); opacity: 0; }
      }

      /* ═══ WARP TUNNEL ═══ */
      @keyframes warpLine {
        0% { transform: scaleX(0); opacity: 0; }
        20% { opacity: 1; }
        100% { transform: scaleX(3); opacity: 0; }
      }

      /* ═══ ACHIEVEMENT UNLOCK ═══ */
      @keyframes achievementSlide {
        0% { transform: translateY(-100%) scale(0.8); opacity: 0; }
        15% { transform: translateY(0) scale(1.05); opacity: 1; }
        85% { transform: translateY(0) scale(1); opacity: 1; }
        100% { transform: translateY(-100%) scale(0.9); opacity: 0; }
      }

      /* ═══ MISSION COMPLETE FLASH ═══ */
      @keyframes missionFlash {
        0% { opacity: 0; }
        20% { opacity: .6; }
        50% { opacity: .2; }
        100% { opacity: 0; }
      }

      /* ═══ SPACE DUST ═══ */
      @keyframes spaceDust {
        0% { transform: translateY(0) translateX(0); opacity: 0; }
        10% { opacity: 0.6; }
        90% { opacity: 0.3; }
        100% { transform: translateY(-100vh) translateX(20px); opacity: 0; }
      }

      /* ═══ MASCOT ENTRANCE ═══ */
      @keyframes mascotFadeIn {
        from { opacity: 0; transform: translateY(10px) scale(0.9); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }

      /* ═══ INSIGHT SLIDE ═══ */
      @keyframes insightSlide {
        from { opacity: 0; transform: translateY(6px); max-height: 0; }
        to { opacity: 1; transform: translateY(0); max-height: 200px; }
      }

      /* ═══ NEBULA FLOAT ═══ */
      @keyframes nebulaFloat {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(10px, -15px) scale(1.05); }
        66% { transform: translate(-8px, 8px) scale(0.95); }
      }

      /* ═══ FLOAT VARIANTS ═══ */
      @keyframes float1 {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      @keyframes float2 {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-6px) rotate(5deg); }
      }
      @keyframes float3 {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-10px) scale(1.1); }
      }

      /* ═══ LEVEL COMPLETE CELEBRATION ═══ */
      @keyframes celebrateRing {
        0% { transform: scale(0.5); opacity: 1; border-width: 4px; }
        100% { transform: scale(2.5); opacity: 0; border-width: 1px; }
      }

      /* ═══ PAGE TRANSITIONS ═══ */
      .page {
        min-height: 100vh; min-height: 100dvh;
        background: linear-gradient(165deg, #0c0a1a 0%, #1a1145 25%, #0f172a 50%, #1e1b4b 75%, #0c0a1a 100%);
        position: relative; overflow: hidden;
      }
      .page::before {
        content: ''; position: absolute; inset: 0;
        background-image: radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.4) 0%, transparent 100%),
                          radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,.3) 0%, transparent 100%),
                          radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,.2) 0%, transparent 100%),
                          radial-gradient(1px 1px at 70% 50%, rgba(255,255,255,.35) 0%, transparent 100%),
                          radial-gradient(1px 1px at 50% 90%, rgba(255,255,255,.25) 0%, transparent 100%),
                          radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,.15) 0%, transparent 100%),
                          radial-gradient(1.5px 1.5px at 15% 45%, rgba(255,255,255,.5) 0%, transparent 100%),
                          radial-gradient(1.5px 1.5px at 60% 30%, rgba(255,255,255,.45) 0%, transparent 100%),
                          radial-gradient(0.5px 0.5px at 25% 15%, rgba(255,255,255,.6) 0%, transparent 100%),
                          radial-gradient(0.5px 0.5px at 85% 60%, rgba(255,255,255,.5) 0%, transparent 100%);
        pointer-events: none; z-index: 0;
      }
      .page-enter { animation: fadeUp .35s ease both; }
      .page-zoom { animation: bounceIn .4s ease both; }
      .page-warp { animation: warpSpeed .5s ease both; }

      /* ═══ BUTTON HOVER EFFECTS ═══ */
      .space-btn-hover { transition: all .25s cubic-bezier(.4,0,.2,1) !important; }
      .space-btn-hover:hover:not(:disabled) {
        transform: translateY(-2px) scale(1.02) !important;
        filter: brightness(1.1);
      }
      .space-btn-hover:active:not(:disabled) {
        transform: translateY(0) scale(0.98) !important;
        filter: brightness(0.95);
      }

      /* ═══ ENHANCED BUTTON PRESS FEEDBACK ═══ */
      .space-btn-hover::after {
        content: ''; position: absolute; inset: 0; border-radius: inherit;
        background: radial-gradient(circle at center, rgba(255,255,255,.15), transparent 70%);
        opacity: 0; transition: opacity .2s;
      }
      .space-btn-hover:active::after { opacity: 1; }

      /* ═══ PLANET/MODE CARD HOVER ═══ */
      .planet-card { transition: all .3s cubic-bezier(.4,0,.2,1); }
      .planet-card:hover {
        transform: translateY(-4px) scale(1.03);
        box-shadow: 0 12px 40px rgba(0,0,0,.3), 0 0 20px var(--glow-color, rgba(124,58,237,.2));
      }
      .planet-card:active { transform: translateY(-1px) scale(0.98); }

      /* ═══ SMOOTH PAGE HYPERSPACE ═══ */
      .page-hyperspace {
        animation: hyperspaceJump .7s cubic-bezier(.25,.1,.25,1) both;
      }
      @keyframes hyperspaceJump {
        0% { transform: scale(1); opacity: 1; filter: blur(0); }
        30% { transform: scale(0.97); opacity: .8; filter: blur(1px); }
        50% { transform: scale(1.05); opacity: .6; filter: blur(3px); }
        70% { transform: scale(0.98); opacity: .9; filter: blur(1px); }
        100% { transform: scale(1); opacity: 1; filter: blur(0); }
      }

      /* ═══ SCROLLBAR ═══ */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(124,58,237,.3); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(124,58,237,.5); }

      /* ═══ CREW RESCUE CELEBRATION ═══ */
      @keyframes crewRescue {
        0% { transform: scale(0) rotate(-180deg); opacity: 0; filter: blur(8px); }
        40% { transform: scale(1.3) rotate(15deg); opacity: 1; filter: blur(0); }
        60% { transform: scale(0.9) rotate(-5deg); }
        80% { transform: scale(1.1) rotate(3deg); }
        100% { transform: scale(1) rotate(0deg); opacity: 1; }
      }
      @keyframes crewGlow {
        0%, 100% { box-shadow: 0 0 20px rgba(251,191,36,.2), 0 0 40px rgba(124,58,237,.1); }
        50% { box-shadow: 0 0 40px rgba(251,191,36,.4), 0 0 80px rgba(124,58,237,.2), 0 0 120px rgba(99,102,241,.1); }
      }

      /* ═══ ARTIFACT UNLOCK ═══ */
      @keyframes artifactReveal {
        0% { transform: rotateY(180deg) scale(0.5); opacity: 0; filter: brightness(2); }
        30% { transform: rotateY(90deg) scale(0.9); opacity: 0.7; }
        60% { transform: rotateY(0deg) scale(1.15); opacity: 1; filter: brightness(1.5); }
        80% { transform: scale(0.95); filter: brightness(1.1); }
        100% { transform: scale(1); filter: brightness(1); }
      }
      @keyframes artifactFloat {
        0%, 100% { transform: translateY(0) rotate(-2deg); filter: drop-shadow(0 4px 12px rgba(251,191,36,.3)); }
        50% { transform: translateY(-8px) rotate(2deg); filter: drop-shadow(0 8px 20px rgba(251,191,36,.5)); }
      }
      @keyframes rarityShimmer {
        0% { background-position: -200% center; }
        100% { background-position: 200% center; }
      }

      /* ═══ MISSION ARC PROGRESS ═══ */
      @keyframes chapterUnlock {
        0% { transform: scale(0.8); opacity: 0; filter: brightness(0.5); }
        50% { transform: scale(1.1); filter: brightness(1.5); }
        100% { transform: scale(1); opacity: 1; filter: brightness(1); }
      }
      @keyframes pathConnect {
        from { stroke-dashoffset: 100; }
        to { stroke-dashoffset: 0; }
      }
      @keyframes crewPortraitPop {
        0% { transform: translate(-50%, -50%) scale(0); }
        60% { transform: translate(-50%, -50%) scale(1.2); }
        100% { transform: translate(-50%, -50%) scale(1); }
      }

      /* ═══ CAPTAIN'S LOG ENHANCED ═══ */
      @keyframes logTypewriter {
        from { max-height: 0; opacity: 0; }
        to { max-height: 300px; opacity: 1; }
      }
      @keyframes logStardate {
        0% { opacity: 0; letter-spacing: 8px; }
        100% { opacity: 1; letter-spacing: 3px; }
      }
      @keyframes scanline {
        0% { top: -5%; }
        100% { top: 105%; }
      }

      /* ═══ TRANSITION WARP ENHANCED ═══ */
      @keyframes warpStars {
        0% { transform: translateZ(0) scale(1); opacity: 0.3; }
        50% { opacity: 1; }
        100% { transform: translateZ(200px) scale(0.1); opacity: 0; }
      }
      @keyframes warpTunnel {
        0% { transform: scale(0); opacity: 0; border-width: 3px; }
        50% { opacity: 0.8; }
        100% { transform: scale(20); opacity: 0; border-width: 0.5px; }
      }
      @keyframes transitionText {
        0% { opacity: 0; transform: translateY(10px); letter-spacing: 0; }
        30% { opacity: 1; transform: translateY(0); letter-spacing: 4px; }
        80% { opacity: 1; }
        100% { opacity: 0; letter-spacing: 8px; }
      }

      /* ═══ ENHANCED MICRO-INTERACTIONS ═══ */
      @keyframes ripple {
        0% { transform: scale(0); opacity: 0.5; }
        100% { transform: scale(4); opacity: 0; }
      }
      @keyframes successPulse {
        0% { box-shadow: 0 0 0 0 rgba(52,211,153,.4); }
        70% { box-shadow: 0 0 0 15px rgba(52,211,153,0); }
        100% { box-shadow: 0 0 0 0 rgba(52,211,153,0); }
      }
      @keyframes glowPulse {
        0%, 100% { filter: drop-shadow(0 0 3px var(--glow-color, rgba(124,58,237,.3))); }
        50% { filter: drop-shadow(0 0 12px var(--glow-color, rgba(124,58,237,.6))) drop-shadow(0 0 24px var(--glow-color, rgba(124,58,237,.2))); }
      }
      @keyframes numberCountUp {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes slideInFromBottom {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes scaleInBounce {
        0% { transform: scale(0); }
        60% { transform: scale(1.15); }
        80% { transform: scale(0.95); }
        100% { transform: scale(1); }
      }

      /* ═══ RARITY BORDERS ═══ */
      .rarity-common { border: 2px solid rgba(148,163,184,.3); }
      .rarity-rare { border: 2px solid rgba(59,130,246,.5); animation: cosmicGlow 3s ease infinite; --glow-color: rgba(59,130,246,.3); }
      .rarity-epic { border: 2px solid rgba(168,85,247,.5); animation: cosmicGlow 2.5s ease infinite; --glow-color: rgba(168,85,247,.4); }
      .rarity-legendary { border: 2px solid rgba(251,191,36,.5); animation: cosmicGlow 2s ease infinite, rarityShimmer 3s linear infinite; --glow-color: rgba(251,191,36,.4); background-size: 200% auto; }

      /* ═══ CREW DIALOGUE SYSTEM ═══ */
      @keyframes crewDialogueSlide {
        0% { opacity: 0; transform: translateX(-12px) scale(0.95); }
        100% { opacity: 1; transform: translateX(0) scale(1); }
      }
      @keyframes crewDialogueFade {
        0% { opacity: 1; transform: translateY(0); }
        70% { opacity: 1; }
        100% { opacity: 0; transform: translateY(-8px); }
      }
      .crew-dialogue {
        animation: crewDialogueSlide .4s cubic-bezier(.16,1,.3,1) both;
      }
      .crew-dialogue-exit {
        animation: crewDialogueFade .5s ease .3s both;
      }

      /* ═══ PLANET LORE ENTRIES ═══ */
      @keyframes loreReveal {
        0% { opacity: 0; transform: translateY(8px); max-height: 0; }
        100% { opacity: 1; transform: translateY(0); max-height: 120px; }
      }
      @keyframes loreGlow {
        0%, 100% { border-color: rgba(167,139,250,.12); }
        50% { border-color: rgba(167,139,250,.3); }
      }

      /* ═══ MATH INSIGHT TOAST ═══ */
      @keyframes insightToast {
        0% { opacity: 0; transform: translateY(6px) scale(0.96); }
        15% { opacity: 1; transform: translateY(0) scale(1); }
        85% { opacity: 1; transform: translateY(0) scale(1); }
        100% { opacity: 0; transform: translateY(-4px) scale(0.98); }
      }

      /* ═══ DAILY MOTIVATION BANNER ═══ */
      @keyframes motivationPulse {
        0%, 100% { opacity: .85; }
        50% { opacity: 1; }
      }
      @keyframes motivationSlide {
        0% { opacity: 0; transform: translateY(-8px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      /* ═══ ENHANCED STAR ANIMATIONS ═══ */
      @keyframes starReveal {
        0% { transform: scale(0) rotate(-90deg); opacity: 0; filter: brightness(2); }
        50% { transform: scale(1.3) rotate(10deg); opacity: 1; filter: brightness(1.5); }
        70% { transform: scale(0.9) rotate(-5deg); }
        100% { transform: scale(1) rotate(0deg); filter: brightness(1); }
      }
      @keyframes starShine {
        0%, 100% { box-shadow: 0 0 0 0 transparent; }
        50% { box-shadow: 0 0 20px rgba(251,191,36,.3), 0 0 40px rgba(251,191,36,.15); }
      }
      @keyframes statTick {
        0% { transform: scale(0.5); opacity: 0; }
        60% { transform: scale(1.1); }
        100% { transform: scale(1); opacity: 1; }
      }

      /* ═══ STREAK CELEBRATION ═══ */
      @keyframes streakFire {
        0% { transform: scale(0.8); filter: brightness(1); }
        25% { transform: scale(1.2); filter: brightness(1.4); }
        50% { transform: scale(1.05); filter: brightness(1.2); }
        100% { transform: scale(1); filter: brightness(1); }
      }
      @keyframes streakRing {
        0% { transform: scale(0.3); opacity: .8; border-width: 3px; }
        100% { transform: scale(2); opacity: 0; border-width: 1px; }
      }

      /* ═══ ENHANCED STARFIELD ═══ */
      .space-bg::after {
        content: '';
        position: absolute; inset: 0;
        background-image:
          radial-gradient(1px 1px at 5% 15%, rgba(255,255,255,.6) 0%, transparent 100%),
          radial-gradient(1px 1px at 12% 42%, rgba(255,255,255,.35) 0%, transparent 100%),
          radial-gradient(1.5px 1.5px at 18% 78%, rgba(167,139,250,.5) 0%, transparent 100%),
          radial-gradient(1px 1px at 25% 5%, rgba(255,255,255,.4) 0%, transparent 100%),
          radial-gradient(0.5px 0.5px at 32% 35%, rgba(255,255,255,.6) 0%, transparent 100%),
          radial-gradient(1px 1px at 38% 88%, rgba(255,255,255,.3) 0%, transparent 100%),
          radial-gradient(1.5px 1.5px at 45% 22%, rgba(251,191,36,.3) 0%, transparent 100%),
          radial-gradient(1px 1px at 52% 55%, rgba(255,255,255,.5) 0%, transparent 100%),
          radial-gradient(0.5px 0.5px at 58% 72%, rgba(255,255,255,.45) 0%, transparent 100%),
          radial-gradient(1px 1px at 65% 8%, rgba(255,255,255,.35) 0%, transparent 100%),
          radial-gradient(1.5px 1.5px at 72% 45%, rgba(99,102,241,.35) 0%, transparent 100%),
          radial-gradient(1px 1px at 78% 82%, rgba(255,255,255,.4) 0%, transparent 100%),
          radial-gradient(0.5px 0.5px at 85% 18%, rgba(255,255,255,.55) 0%, transparent 100%),
          radial-gradient(1px 1px at 92% 58%, rgba(255,255,255,.3) 0%, transparent 100%),
          radial-gradient(1.5px 1.5px at 95% 92%, rgba(236,72,153,.25) 0%, transparent 100%);
        animation: starfieldDrift 120s linear infinite;
        pointer-events: none; z-index: 0;
      }
      @keyframes starfieldDrift {
        0% { transform: translateY(0); }
        100% { transform: translateY(-20px); }
      }
      /* Ambient nebula glow behind content */
      .space-bg::before {
        content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 0;
        background:
          radial-gradient(ellipse 60% 40% at 20% 80%, rgba(99,102,241,.06) 0%, transparent 70%),
          radial-gradient(ellipse 50% 50% at 80% 20%, rgba(139,92,246,.05) 0%, transparent 70%),
          radial-gradient(ellipse 40% 30% at 50% 50%, rgba(236,72,153,.03) 0%, transparent 70%);
        animation: nebulaShift 60s ease-in-out infinite alternate;
      }
      @keyframes nebulaShift {
        0% { opacity: .5; }
        50% { opacity: .8; }
        100% { opacity: .6; }
      }

      /* ═══ NARRATIVE SCROLL ═══ */
      @keyframes narrativeScroll {
        0% { opacity: 0; transform: translateY(12px) scale(0.97); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }
      @keyframes narrativeFade {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }
      @keyframes subtitleGlow {
        0%, 100% { text-shadow: 0 1px 6px rgba(167,139,250,.3); }
        50% { text-shadow: 0 1px 12px rgba(167,139,250,.5), 0 0 20px rgba(167,139,250,.15); }
      }

      /* ═══ LOGIN CARD ═══ */
      @keyframes loginCardAppear {
        0% { opacity: 0; transform: translateY(16px) scale(0.96); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }
      @keyframes logoReveal {
        0% { opacity: 0; transform: translateY(-10px) scale(0.95); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }

      /* ═══ ROCKET TRAIL ENHANCED ═══ */
      @keyframes rocketTrail {
        0% { height: 16px; opacity: .7; }
        100% { height: 24px; opacity: .4; }
      }

      /* ═══ STORY SCENE FLOAT ═══ */
      @keyframes storyFloat {
        0%, 100% { transform: translateY(0) rotate(-2deg); }
        50% { transform: translateY(-6px) rotate(2deg); }
      }

      /* ═══ BADGE UNLOCK ═══ */
      @keyframes badgeUnlock {
        0% { transform: scale(0) rotate(-180deg); }
        60% { transform: scale(1.3) rotate(15deg); }
        100% { transform: scale(1) rotate(0deg); }
      }

      /* ═══ HYPERSPACE PAGE TRANSITION ═══ */
      .page-hyperspace {
        animation: hyperspaceEntry .7s cubic-bezier(.16,1,.3,1) both;
      }
      @keyframes hyperspaceEntry {
        0% { transform: scale(0.9); opacity: 0; filter: blur(4px) brightness(1.3); }
        40% { filter: blur(0) brightness(1.1); }
        100% { transform: scale(1); opacity: 1; filter: none; }
      }
      .page-fade { animation: fadeIn .3s ease both; }

      /* ═══ LOGIN STREAK CELEBRATION ═══ */
      @keyframes streakBannerSlide {
        0% { opacity: 0; transform: translateY(-20px) scale(0.9); }
        30% { opacity: 1; transform: translateY(4px) scale(1.02); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }
      @keyframes streakNumberPop {
        0% { transform: scale(0) rotate(-15deg); }
        50% { transform: scale(1.3) rotate(5deg); }
        70% { transform: scale(0.9) rotate(-2deg); }
        100% { transform: scale(1) rotate(0deg); }
      }
      @keyframes streakFlame {
        0%, 100% { transform: scaleY(1) scaleX(1); filter: brightness(1); }
        25% { transform: scaleY(1.15) scaleX(0.9); filter: brightness(1.2); }
        50% { transform: scaleY(0.9) scaleX(1.1); filter: brightness(1.1); }
        75% { transform: scaleY(1.1) scaleX(0.95); filter: brightness(1.15); }
      }

      /* ═══ MATH INSIGHT HIGHLIGHT ═══ */
      @keyframes insightGlow {
        0%, 100% { border-color: rgba(167,139,250,.15); box-shadow: 0 0 8px rgba(167,139,250,.05); }
        50% { border-color: rgba(167,139,250,.35); box-shadow: 0 0 16px rgba(167,139,250,.15); }
      }
      @keyframes insightIconPulse {
        0%, 100% { transform: scale(1); filter: brightness(1); }
        50% { transform: scale(1.1); filter: brightness(1.2); }
      }

      /* ═══ ENHANCED OPTION BUTTON FEEDBACK ═══ */
      .option-btn {
        transition: all .2s cubic-bezier(.4,0,.2,1);
        -webkit-tap-highlight-color: transparent;
      }
      .option-btn:active:not(:disabled) {
        transform: scale(0.95);
      }
      .option-btn.correct-flash {
        animation: correctOptionFlash .5s ease both;
      }
      .option-btn.wrong-flash {
        animation: wrongOptionFlash .5s ease both;
      }
      @keyframes correctOptionFlash {
        0% { background: rgba(52,211,153,.2); }
        40% { background: rgba(52,211,153,.4); box-shadow: 0 0 20px rgba(52,211,153,.3); }
        100% { background: rgba(52,211,153,.15); }
      }
      @keyframes wrongOptionFlash {
        0% { background: rgba(248,113,113,.15); }
        25% { transform: translateX(-3px); }
        50% { transform: translateX(3px); background: rgba(248,113,113,.3); }
        75% { transform: translateX(-2px); }
        100% { transform: translateX(0); background: rgba(248,113,113,.1); }
      }

      /* ═══ LEVEL UP CELEBRATION RAYS ═══ */
      @keyframes levelUpRays {
        from { transform: translate(-50%,-50%) rotate(0deg); }
        to { transform: translate(-50%,-50%) rotate(360deg); }
      }
      @keyframes levelUpBanner {
        0% { transform: translateY(10px) scale(0.95); opacity: 0; }
        60% { transform: translateY(-3px) scale(1.02); }
        100% { transform: translateY(0) scale(1); opacity: 1; }
      }

      /* ═══ CAPTAIN LOG GLOW ═══ */
      @keyframes captainLogGlow {
        0%, 100% { border-color: rgba(251,191,36,.12); }
        50% { border-color: rgba(251,191,36,.25); }
      }

      /* ═══ CREW DIALOGUE ENTRANCE ═══ */
      @keyframes crewDialogue {
        0% { opacity: 0; transform: translateX(-10px); }
        100% { opacity: 1; transform: translateX(0); }
      }

      /* ═══ NEBULA GLOW ELEMENT ═══ */
      .nebula-glow {
        position: absolute; border-radius: 50%;
        filter: blur(60px); pointer-events: none; z-index: 0;
      }

      /* ═══ CSS PLANETS — 3D-rendered procedural planets ═══ */
      .css-planet {
        border-radius: 50%;
        position: relative;
        overflow: hidden;
        box-sizing: border-box;
      }
      .css-planet::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 25%, rgba(255,255,255,.35) 0%, rgba(255,255,255,.08) 25%, transparent 55%);
        z-index: 2;
      }
      .css-planet::after {
        content: '';
        position: absolute;
        bottom: 0; left: 0; right: 0;
        height: 45%;
        border-radius: 0 0 50% 50%;
        background: linear-gradient(to top, rgba(0,0,0,.35), transparent);
        z-index: 1;
      }
      .planet-ring {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%) rotateX(65deg);
        border-radius: 50%;
        border: 2px solid rgba(255,255,255,.15);
        pointer-events: none;
        z-index: 3;
      }
      .planet-surface-lines {
        position: absolute; inset: 0;
        border-radius: 50%;
        overflow: hidden;
        z-index: 1;
      }
      .planet-surface-lines::before {
        content: '';
        position: absolute;
        top: 20%; left: -10%;
        width: 120%; height: 15%;
        background: rgba(255,255,255,.06);
        border-radius: 50%;
        transform: rotate(-8deg);
      }
      .planet-surface-lines::after {
        content: '';
        position: absolute;
        top: 55%; left: -5%;
        width: 110%; height: 12%;
        background: rgba(255,255,255,.04);
        border-radius: 50%;
        transform: rotate(-5deg);
      }

      /* ═══ ENHANCED ANSWER OPTION BUTTONS ═══ */
      .answer-option {
        transition: all .2s cubic-bezier(.4,0,.2,1);
        position: relative;
        overflow: hidden;
      }
      .answer-option::before {
        content: '';
        position: absolute;
        top: 50%; left: 50%;
        width: 0; height: 0;
        border-radius: 50%;
        background: rgba(255,255,255,.1);
        transform: translate(-50%, -50%);
        transition: width .4s ease, height .4s ease;
      }
      .answer-option:hover::before {
        width: 200%; height: 200%;
      }
      .answer-option:hover:not(:disabled) {
        transform: translateY(-3px) scale(1.03);
        box-shadow: 0 8px 28px rgba(0,0,0,.2) !important;
      }
      .answer-option:active:not(:disabled) {
        transform: translateY(0) scale(0.97);
      }

      /* ═══ GLASS CARD ═══ */
      .glass-card {
        background: rgba(255,255,255,.06);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255,255,255,.1);
        border-radius: 20px;
      }

      /* ═══ ENHANCED PROGRESS BAR ═══ */
      .progress-bar-glow {
        position: relative;
        overflow: hidden;
      }
      .progress-bar-glow::after {
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 50%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,.3), transparent);
        animation: shimmer 2.5s ease-in-out infinite;
      }

      /* ═══ FLOATING PARTICLES ═══ */
      @keyframes particleDrift {
        0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
        10% { opacity: 0.6; }
        90% { opacity: 0.2; }
        100% { transform: translate(var(--dx, 30px), var(--dy, -80px)) rotate(180deg); opacity: 0; }
      }

      /* ═══ GALAXY MAP CONNECTOR BEAMS ═══ */
      @keyframes beamPulse {
        0%, 100% { opacity: 0.3; stroke-width: 1; }
        50% { opacity: 0.8; stroke-width: 2; }
      }
      @keyframes energyFlow {
        0% { stroke-dashoffset: 30; }
        100% { stroke-dashoffset: 0; }
      }

      /* ═══ ANSWER CORRECT CELEBRATION ═══ */
      @keyframes correctBurst {
        0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(52,211,153,.5); }
        40% { transform: scale(1.06); box-shadow: 0 0 0 12px rgba(52,211,153,.15); }
        100% { transform: scale(1); box-shadow: 0 0 0 20px rgba(52,211,153,0); }
      }
      @keyframes wrongBump {
        0%, 100% { transform: translateX(0); }
        15% { transform: translateX(-8px) rotate(-1deg); }
        30% { transform: translateX(7px) rotate(1deg); }
        45% { transform: translateX(-5px); }
        60% { transform: translateX(4px); }
        75% { transform: translateX(-2px); }
      }

      /* ═══ JOURNEY MAP PLANET ORBIT RINGS ═══ */
      @keyframes orbitRotate {
        from { transform: translate(-50%,-50%) rotate(0deg); }
        to { transform: translate(-50%,-50%) rotate(360deg); }
      }
      .orbit-ring {
        border-radius: 50%;
        position: absolute;
        border: 1px dashed rgba(255,255,255,.08);
        pointer-events: none;
      }

      /* ═══ MISSION BANNER ENHANCED ═══ */
      @keyframes missionBannerGlow {
        0%, 100% { border-color: rgba(251,191,36,.15); box-shadow: 0 4px 20px rgba(0,0,0,.2); }
        50% { border-color: rgba(251,191,36,.35); box-shadow: 0 4px 30px rgba(251,191,36,.1), 0 6px 20px rgba(0,0,0,.2); }
      }
      @keyframes scanlineMove {
        0% { top: -10%; }
        100% { top: 110%; }
      }
      .log-panel {
        position: relative;
        overflow: hidden;
      }
      .log-panel::before {
        content: '';
        position: absolute;
        left: 0; right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(251,191,36,.15), transparent);
        animation: scanlineMove 4s linear infinite;
        pointer-events: none;
        z-index: 1;
      }

      /* ═══ HOLOGRAPHIC TEXT EFFECT ═══ */
      .holo-text {
        background: linear-gradient(90deg, #a78bfa, #38bdf8, #34d399, #fbbf24, #f472b6, #a78bfa);
        background-size: 300% 100%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: holoShift 4s linear infinite;
      }
      @keyframes holoShift {
        0% { background-position: 0% 50%; }
        100% { background-position: 300% 50%; }
      }

      /* ═══ AURORA BACKGROUND EFFECT ═══ */
      .aurora-bg::before {
        content: '';
        position: absolute;
        top: -50%; left: -50%;
        width: 200%; height: 200%;
        background:
          radial-gradient(ellipse 40% 30% at 25% 70%, rgba(99,102,241,.08) 0%, transparent 60%),
          radial-gradient(ellipse 35% 25% at 75% 30%, rgba(139,92,246,.06) 0%, transparent 60%),
          radial-gradient(ellipse 45% 35% at 50% 50%, rgba(52,211,153,.04) 0%, transparent 60%);
        animation: auroraWave 20s ease-in-out infinite alternate;
        pointer-events: none; z-index: 0;
      }
      @keyframes auroraWave {
        0% { transform: translate(0, 0) rotate(0deg); }
        33% { transform: translate(2%, -3%) rotate(2deg); }
        66% { transform: translate(-1%, 2%) rotate(-1deg); }
        100% { transform: translate(1%, -1%) rotate(1deg); }
      }

      /* ═══ GALAXY SWIRL ACCENT ═══ */
      @keyframes galaxySwirl {
        0% { transform: rotate(0deg) scale(1); opacity: .15; }
        50% { transform: rotate(180deg) scale(1.1); opacity: .25; }
        100% { transform: rotate(360deg) scale(1); opacity: .15; }
      }
      .galaxy-swirl {
        position: absolute;
        border-radius: 50%;
        background: conic-gradient(from 0deg, transparent, rgba(139,92,246,.15), transparent, rgba(99,102,241,.1), transparent);
        filter: blur(30px);
        pointer-events: none;
        animation: galaxySwirl 30s linear infinite;
      }

      /* ═══ COMET TRAIL EFFECT ═══ */
      @keyframes cometTrail {
        0% { transform: translateX(-100vw) translateY(30vh) rotate(-35deg); opacity: 0; }
        5% { opacity: 1; }
        30% { opacity: .7; }
        100% { transform: translateX(120vw) translateY(-40vh) rotate(-35deg); opacity: 0; }
      }

      /* ═══ ENERGY PULSE RING ═══ */
      @keyframes energyPulseRing {
        0% { transform: scale(0.5); opacity: 0.8; border-width: 3px; filter: brightness(1.5); }
        50% { opacity: 0.4; filter: brightness(1.2); }
        100% { transform: scale(2.5); opacity: 0; border-width: 0.5px; filter: brightness(1); }
      }

      /* ═══ MAGNETIC FLOAT — for interactive elements ═══ */
      @keyframes magneticFloat {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        20% { transform: translateY(-5px) rotate(0.5deg); }
        40% { transform: translateY(-3px) rotate(-0.3deg); }
        60% { transform: translateY(-7px) rotate(0.2deg); }
        80% { transform: translateY(-4px) rotate(-0.4deg); }
      }

      /* ═══ NUMBER MORPH — for counting transitions ═══ */
      @keyframes numberMorph {
        0% { transform: scale(1) translateY(0); opacity: 1; }
        30% { transform: scale(1.3) translateY(-4px); opacity: .7; }
        60% { transform: scale(0.8) translateY(2px); opacity: .5; }
        100% { transform: scale(1) translateY(0); opacity: 1; }
      }

      /* ═══ VICTORY SUPERNOVA ═══ */
      @keyframes supernovaExpand {
        0% { transform: scale(0); opacity: 1; filter: brightness(3); }
        30% { filter: brightness(2); }
        100% { transform: scale(6); opacity: 0; filter: brightness(1); }
      }
      @keyframes supernovaCore {
        0% { transform: scale(0) rotate(0deg); }
        50% { transform: scale(1.5) rotate(180deg); filter: brightness(2); }
        100% { transform: scale(1) rotate(360deg); filter: brightness(1); }
      }

      /* ═══ WARP SPEED LINES ═══ */
      @keyframes warpSpeedLine {
        0% { transform: scaleX(0) translateX(0); opacity: 0; }
        10% { opacity: 1; }
        100% { transform: scaleX(8) translateX(100px); opacity: 0; }
      }

      /* ═══ TYPEWRITER CURSOR VARIANTS ═══ */
      @keyframes cursorBlink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      /* ═══ SMOOTH SCORE INCREMENT ═══ */
      @keyframes scoreIncrement {
        0% { transform: translateY(0) scale(1); color: inherit; }
        30% { transform: translateY(-6px) scale(1.3); color: #fbbf24; }
        60% { transform: translateY(-3px) scale(1.1); }
        100% { transform: translateY(0) scale(1); color: inherit; }
      }

      /* ═══ PLANET DISCOVERY REVEAL ═══ */
      @keyframes planetDiscovery {
        0% { transform: scale(0) rotate(-90deg); opacity: 0; filter: blur(10px) brightness(3); }
        40% { transform: scale(1.2) rotate(10deg); filter: blur(0) brightness(1.5); }
        60% { transform: scale(0.9) rotate(-5deg); filter: brightness(1.2); }
        80% { transform: scale(1.05) rotate(2deg); }
        100% { transform: scale(1) rotate(0deg); opacity: 1; filter: brightness(1); }
      }

      /* ═══ CREW MEMBER JOIN ═══ */
      @keyframes crewJoin {
        0% { transform: translateX(50px) scale(0); opacity: 0; }
        40% { transform: translateX(-5px) scale(1.1); opacity: 1; }
        60% { transform: translateX(3px) scale(0.95); }
        100% { transform: translateX(0) scale(1); }
      }

      /* ═══ MATH SYMBOL DANCE ═══ */
      @keyframes mathSymbolDance {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        25% { transform: translateY(-8px) rotate(15deg); }
        50% { transform: translateY(-4px) rotate(-10deg); }
        75% { transform: translateY(-6px) rotate(8deg); }
      }

      /* ═══ ENHANCED CHIP GLOW — for math manipulatives ═══ */
      @keyframes chipGlow {
        0%, 100% { filter: drop-shadow(0 0 2px var(--chip-color, rgba(59,130,246,.3))); }
        50% { filter: drop-shadow(0 0 8px var(--chip-color, rgba(59,130,246,.6))) drop-shadow(0 0 16px var(--chip-color, rgba(59,130,246,.2))); }
      }

      /* ═══ QUEST COMPLETION FIREWORKS ═══ */
      @keyframes questFirework {
        0% { transform: translateY(0) scale(1); opacity: 1; }
        50% { transform: translateY(-60px) scale(0.5); opacity: .8; }
        51% { transform: translateY(-60px) scale(1.5); opacity: 1; }
        100% { transform: translateY(-60px) scale(2); opacity: 0; }
      }

      /* ═══ LOADING DOTS ═══ */
      @keyframes loadingDot {
        0%, 100% { transform: translateY(0); opacity: .4; }
        50% { transform: translateY(-6px); opacity: 1; }
      }
      .loading-dots span:nth-child(1) { animation: loadingDot .8s ease infinite; }
      .loading-dots span:nth-child(2) { animation: loadingDot .8s ease .15s infinite; }
      .loading-dots span:nth-child(3) { animation: loadingDot .8s ease .3s infinite; }

      /* ═══ ENHANCED TOOLTIP ═══ */
      .space-tooltip {
        position: relative;
      }
      .space-tooltip::after {
        content: attr(data-tooltip);
        position: absolute;
        bottom: calc(100% + 8px);
        left: 50%;
        transform: translateX(-50%) translateY(4px);
        background: rgba(15,23,42,.95);
        color: #e2e8f0;
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 11px;
        font-weight: 600;
        white-space: nowrap;
        pointer-events: none;
        opacity: 0;
        transition: opacity .2s, transform .2s;
        border: 1px solid rgba(139,92,246,.2);
        box-shadow: 0 4px 12px rgba(0,0,0,.3);
        z-index: 1000;
      }
      .space-tooltip:hover::after {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      /* ═══ ACCESSIBILITY ═══ */
      .a11y-large * { font-size: 110% !important; }
      .a11y-contrast .page { filter: contrast(1.3); }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
      }

      /* ═══ ENHANCED LOGIN CINEMATIC ═══ */
      @keyframes loginCardAppear {
        0% { opacity: 0; transform: translateY(40px) scale(0.92); }
        60% { transform: translateY(-4px) scale(1.01); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }
      @keyframes logoReveal {
        0% { opacity: 0; transform: scale(0.5) rotate(-10deg); filter: blur(8px); }
        50% { transform: scale(1.08) rotate(2deg); filter: blur(0); }
        100% { opacity: 1; transform: scale(1) rotate(0deg); }
      }
      @keyframes subtitleGlow {
        0%, 100% { text-shadow: 0 0 8px rgba(167,139,250,.3), 0 1px 6px rgba(167,139,250,.2); }
        50% { text-shadow: 0 0 16px rgba(167,139,250,.5), 0 1px 12px rgba(167,139,250,.4), 0 0 32px rgba(167,139,250,.15); }
      }
      @keyframes rocketTrail {
        0% { opacity: 0.8; height: 12px; }
        50% { opacity: 0.3; height: 28px; }
        100% { opacity: 0.8; height: 12px; }
      }
      @keyframes inputFocusGlow {
        0%, 100% { box-shadow: 0 0 0 0 rgba(99,102,241,0); }
        50% { box-shadow: 0 0 0 3px rgba(99,102,241,.15); }
      }

      /* ═══ ENHANCED AGE SELECT PLANET CARDS ═══ */
      @keyframes planetCardReveal {
        0% { opacity: 0; transform: translateX(-30px) scale(0.9); }
        60% { transform: translateX(4px) scale(1.02); }
        100% { opacity: 1; transform: translateX(0) scale(1); }
      }
      @keyframes planetIconSpin {
        0% { transform: rotate(0deg) scale(1); }
        50% { transform: rotate(180deg) scale(1.1); }
        100% { transform: rotate(360deg) scale(1); }
      }
      @keyframes stopsCounter {
        0% { opacity: 0; transform: scale(0); }
        60% { transform: scale(1.2); }
        100% { opacity: 1; transform: scale(1); }
      }

      /* ═══ ENHANCED GAME FEEDBACK ═══ */
      @keyframes insightReveal {
        0% { opacity: 0; transform: translateY(8px); max-height: 0; padding-top: 0; padding-bottom: 0; }
        100% { opacity: 1; transform: translateY(0); max-height: 120px; padding-top: 10px; padding-bottom: 10px; }
      }
      @keyframes correctStarBurst {
        0% { transform: scale(0) rotate(0deg); opacity: 1; }
        50% { transform: scale(1.5) rotate(180deg); opacity: 0.8; }
        100% { transform: scale(2) rotate(360deg); opacity: 0; }
      }
      @keyframes xpGainPop {
        0% { opacity: 0; transform: translateY(10px) scale(0.5); }
        40% { opacity: 1; transform: translateY(-8px) scale(1.15); }
        70% { transform: translateY(-4px) scale(0.95); }
        100% { opacity: 1; transform: translateY(-6px) scale(1); }
      }

      /* ═══ ENHANCED JOURNEY MAP ═══ */
      @keyframes planetPulseRing {
        0% { transform: translate(-50%,-50%) scale(0.8); opacity: 0.6; }
        100% { transform: translate(-50%,-50%) scale(1.8); opacity: 0; }
      }
      @keyframes connectorBeam {
        0% { stroke-dashoffset: 20; opacity: 0.3; }
        50% { opacity: 0.8; }
        100% { stroke-dashoffset: 0; opacity: 0.3; }
      }

      /* ═══ ENHANCED BUTTON INTERACTIONS ═══ */
      .login-input:focus {
        border-color: rgba(99,102,241,.5) !important;
        box-shadow: 0 0 0 3px rgba(99,102,241,.12), 0 4px 16px rgba(0,0,0,.15) !important;
        background: rgba(30,27,75,.7) !important;
      }
      .login-input::placeholder { color: rgba(148,163,184,.5); }
      .age-card:hover {
        transform: translateY(-3px) scale(1.02) !important;
        box-shadow: 0 8px 32px rgba(0,0,0,.3), 0 0 20px var(--card-glow, rgba(99,102,241,.2)) !important;
      }
      .age-card:active {
        transform: translateY(0) scale(0.98) !important;
      }
      .menu-action-btn:hover {
        transform: translateY(-2px) !important;
        background: rgba(255,255,255,.14) !important;
        border-color: rgba(255,255,255,.25) !important;
      }

      /* ═══ ENHANCED STREAK FIRE EFFECT ═══ */
      @keyframes streakFlame {
        0%, 100% { text-shadow: 0 0 4px #f97316, 0 0 8px #f97316; transform: scale(1); }
        25% { text-shadow: 0 0 8px #ef4444, 0 0 16px #f97316, 0 0 24px #fbbf24; transform: scale(1.1); }
        50% { text-shadow: 0 0 12px #ef4444, 0 0 24px #f97316, 0 0 36px #fbbf24; transform: scale(1.15); }
        75% { text-shadow: 0 0 8px #ef4444, 0 0 16px #f97316; transform: scale(1.08); }
      }
      @keyframes streakCounter {
        0% { transform: scale(1); }
        50% { transform: scale(1.3) rotate(5deg); }
        100% { transform: scale(1) rotate(0); }
      }

      /* ═══ STAR RATING REVEAL ═══ */
      @keyframes starReveal {
        0% { transform: scale(0) rotate(-180deg); opacity: 0; filter: brightness(3); }
        50% { transform: scale(1.4) rotate(15deg); filter: brightness(1.5); }
        70% { transform: scale(0.85) rotate(-5deg); }
        100% { transform: scale(1) rotate(0deg); opacity: 1; filter: brightness(1); }
      }
      @keyframes starShine {
        0%, 100% { filter: drop-shadow(0 0 4px rgba(251,191,36,.4)); }
        50% { filter: drop-shadow(0 0 12px rgba(251,191,36,.8)) drop-shadow(0 0 24px rgba(251,191,36,.3)); }
      }

      /* ═══ LEVEL UP CELEBRATION ═══ */
      @keyframes levelUpBanner {
        0% { transform: scale(0) rotateX(90deg); opacity: 0; }
        40% { transform: scale(1.1) rotateX(-5deg); opacity: 1; }
        60% { transform: scale(0.95) rotateX(2deg); }
        80% { transform: scale(1.02) rotateX(-1deg); }
        100% { transform: scale(1) rotateX(0deg); opacity: 1; }
      }
      @keyframes levelUpRays {
        0% { transform: rotate(0deg); opacity: 0.3; }
        100% { transform: rotate(360deg); opacity: 0.3; }
      }

      /* ═══ MATH INSIGHT GLOW ═══ */
      @keyframes insightGlow {
        0%, 100% { border-color: rgba(56,189,248,.2); box-shadow: 0 2px 12px rgba(56,189,248,.05); }
        50% { border-color: rgba(56,189,248,.4); box-shadow: 0 2px 20px rgba(56,189,248,.15), inset 0 0 20px rgba(56,189,248,.03); }
      }

      /* ═══ NARRATIVE SCROLL EFFECT ═══ */
      @keyframes narrativeScroll {
        0% { opacity: 0; transform: perspective(400px) rotateX(25deg) translateY(40px); }
        100% { opacity: 1; transform: perspective(400px) rotateX(0deg) translateY(0); }
      }
      @keyframes narrativeFade {
        0% { opacity: 0; letter-spacing: 2px; }
        100% { opacity: 1; letter-spacing: 0.5px; }
      }

      /* ═══ CORRECT ANSWER PARTICLE RING ═══ */
      @keyframes correctRing {
        0% { transform: scale(0.3); opacity: 1; border-width: 4px; }
        100% { transform: scale(2.5); opacity: 0; border-width: 1px; }
      }

      /* ═══ MISSION COMPLETE SEQUENCE ═══ */
      @keyframes missionComplete {
        0% { transform: scale(0.5); opacity: 0; filter: brightness(2) blur(4px); }
        30% { transform: scale(1.15); filter: brightness(1.5) blur(0); }
        50% { transform: scale(0.95); opacity: 1; }
        70% { transform: scale(1.05); }
        100% { transform: scale(1); filter: brightness(1); }
      }

      /* ═══ INTERACTIVE HOVER GLOW ═══ */
      .mode-card-hover {
        transition: all .3s cubic-bezier(.4,0,.2,1);
      }
      .mode-card-hover:hover {
        transform: translateY(-4px) scale(1.02);
        box-shadow: 0 12px 40px rgba(0,0,0,.3), 0 0 20px var(--card-glow, rgba(124,58,237,.15));
      }
      .mode-card-hover:active {
        transform: translateY(-1px) scale(0.98);
      }

      /* ═══ STAT COUNTER ANIMATION ═══ */
      @keyframes statPop {
        0% { transform: scale(1); }
        50% { transform: scale(1.2); color: #fbbf24; }
        100% { transform: scale(1); }
      }

      /* ═══ GUIDE CELEBRATION ═══ */
      @keyframes guideCelebrate {
        0%, 100% { transform: translateY(0) rotate(0); }
        15% { transform: translateY(-12px) rotate(-8deg); }
        30% { transform: translateY(-6px) rotate(8deg); }
        45% { transform: translateY(-10px) rotate(-5deg); }
        60% { transform: translateY(-4px) rotate(5deg); }
        75% { transform: translateY(-8px) rotate(-3deg); }
      }

      /* ═══ PROGRESS BAR FILL ═══ */
      @keyframes progressFill {
        from { width: 0; }
        to { width: var(--progress, 100%); }
      }

      /* ═══ BADGE UNLOCK FANFARE ═══ */
      @keyframes badgeUnlock {
        0% { transform: scale(0) rotate(-360deg); opacity: 0; filter: brightness(3); }
        40% { transform: scale(1.3) rotate(20deg); opacity: 1; filter: brightness(1.5); }
        60% { transform: scale(0.85) rotate(-10deg); filter: brightness(1.2); }
        80% { transform: scale(1.1) rotate(5deg); }
        100% { transform: scale(1) rotate(0); filter: brightness(1); }
      }

      /* ═══ HYPERSPACE JUMP TRANSITION ═══ */
      .page-hyperspace {
        animation: hyperspaceJump .7s cubic-bezier(.16,1,.3,1) both;
      }
      @keyframes hyperspaceJump {
        0% { transform: scale(1) translateY(0); opacity: 1; filter: blur(0) brightness(1); }
        15% { transform: scale(1.02) translateY(0); filter: blur(0) brightness(1.3); }
        35% { transform: scale(.7) translateY(0); opacity: .8; filter: blur(8px) brightness(2); }
        55% { transform: scale(1.15) translateY(-8px); opacity: 0; filter: blur(12px) brightness(3); }
        56% { transform: scale(.85) translateY(15px); opacity: 0; filter: blur(6px) brightness(1.5); }
        100% { transform: scale(1) translateY(0); opacity: 1; filter: blur(0) brightness(1); }
      }

      /* ═══ XP FLOAT UP ═══ */
      @keyframes xpFloatUp {
        0% { transform: translateY(0) scale(1); opacity: 1; }
        50% { transform: translateY(-20px) scale(1.15); opacity: .9; }
        100% { transform: translateY(-40px) scale(.8); opacity: 0; }
      }

      /* ═══ QUESTION CARD ENTRANCE ═══ */
      @keyframes questionSlideIn {
        0% { transform: translateX(60px) scale(.92); opacity: 0; }
        60% { transform: translateX(-4px) scale(1.01); opacity: 1; }
        100% { transform: translateX(0) scale(1); opacity: 1; }
      }

      /* ═══ STAT COUNTER TICK ═══ */
      @keyframes statTick {
        0% { transform: scale(1); }
        40% { transform: scale(1.25); color: #fbbf24; }
        100% { transform: scale(1); }
      }

      /* ═══ MISSION HEADER GLOW ═══ */
      @keyframes missionGlow {
        0%, 100% { text-shadow: 0 0 8px rgba(99,102,241,.3); }
        50% { text-shadow: 0 0 16px rgba(99,102,241,.6), 0 0 32px rgba(99,102,241,.2); }
      }

      /* ═══ ANSWER OPTION STAGGER ═══ */
      @keyframes optionReveal {
        0% { transform: translateY(12px) scale(.95); opacity: 0; }
        100% { transform: translateY(0) scale(1); opacity: 1; }
      }

      /* ═══ v5.10: CONSTELLATION PROGRESS — connected star map ═══ */
      @keyframes constellationDraw {
        from { stroke-dashoffset: 100; opacity: 0; }
        to { stroke-dashoffset: 0; opacity: 1; }
      }
      @keyframes constellationStar {
        0% { r: 0; opacity: 0; filter: brightness(3); }
        40% { r: 5; opacity: 1; filter: brightness(2); }
        100% { r: 3.5; opacity: 1; filter: brightness(1); }
      }
      @keyframes constellationPulse {
        0%, 100% { r: 3.5; opacity: .8; }
        50% { r: 4.5; opacity: 1; }
      }

      /* ═══ v5.10: NEBULA RIBBON — atmospheric depth layer ═══ */
      @keyframes nebulaRibbon {
        0% { transform: translateX(-5%) scaleY(1) rotate(-2deg); opacity: .06; }
        33% { transform: translateX(2%) scaleY(1.15) rotate(0deg); opacity: .1; }
        66% { transform: translateX(-3%) scaleY(0.9) rotate(1deg); opacity: .07; }
        100% { transform: translateX(-5%) scaleY(1) rotate(-2deg); opacity: .06; }
      }
      .nebula-ribbon {
        position: absolute; left: -10%; right: -10%;
        height: 120px; border-radius: 50%;
        pointer-events: none; z-index: 0;
        filter: blur(40px);
        animation: nebulaRibbon 25s ease-in-out infinite;
      }

      /* ═══ v5.10: CRYSTAL COLLECT — reward moment ═══ */
      @keyframes crystalCollect {
        0% { transform: scale(0) rotate(-90deg); opacity: 0; filter: brightness(3) saturate(2); }
        25% { transform: scale(1.4) rotate(30deg); opacity: 1; filter: brightness(2) saturate(1.5); }
        50% { transform: scale(0.85) rotate(-15deg); filter: brightness(1.3); }
        75% { transform: scale(1.1) rotate(5deg); }
        100% { transform: scale(1) rotate(0deg); opacity: 1; filter: brightness(1) saturate(1); }
      }
      @keyframes crystalShimmer {
        0%, 100% { background-position: -200% center; filter: brightness(1); }
        50% { background-position: 200% center; filter: brightness(1.15); }
      }

      /* ═══ v5.10: GRAVITATIONAL WAVE — subtle bg pulse ═══ */
      @keyframes gravWave {
        0% { transform: scale(1); opacity: .04; }
        50% { transform: scale(1.3); opacity: .08; }
        100% { transform: scale(1); opacity: .04; }
      }

      /* ═══ v5.10: WORMHOLE PORTAL — screen transition ═══ */
      @keyframes wormholeOpen {
        0% { transform: scale(0) rotate(0deg); opacity: 0; border-width: 4px; }
        40% { opacity: 1; }
        100% { transform: scale(15) rotate(720deg); opacity: 0; border-width: 0.5px; }
      }

      /* ═══ v5.10: MISSION STAMP — result screen ═══ */
      @keyframes missionStamp {
        0% { transform: scale(3) rotate(-30deg); opacity: 0; }
        40% { transform: scale(0.9) rotate(5deg); opacity: 1; }
        60% { transform: scale(1.1) rotate(-2deg); }
        100% { transform: scale(1) rotate(0deg); opacity: 1; }
      }

      /* ═══ v5.10: HOLOGRAPHIC CARD REVEAL — enhanced card ═══ */
      @keyframes holoCardReveal {
        0% { transform: perspective(600px) rotateY(180deg) rotateX(10deg) scale(0.7); opacity: 0; }
        30% { transform: perspective(600px) rotateY(90deg) rotateX(5deg) scale(0.9); opacity: .5; }
        60% { transform: perspective(600px) rotateY(0deg) rotateX(-5deg) scale(1.05); opacity: 1; }
        80% { transform: perspective(600px) rotateY(-5deg) rotateX(2deg) scale(1.02); }
        100% { transform: perspective(600px) rotateY(0deg) rotateX(0deg) scale(1); opacity: 1; }
      }
      @keyframes holoRainbow {
        0% { background-position: 0% 50%; filter: brightness(1); }
        25% { filter: brightness(1.1); }
        50% { background-position: 100% 50%; filter: brightness(1.2); }
        75% { filter: brightness(1.1); }
        100% { background-position: 0% 50%; filter: brightness(1); }
      }

      /* ═══ v5.10: STARDUST TRAIL — correct answer particles ═══ */
      @keyframes stardustTrail {
        0% { transform: translate(0, 0) scale(1); opacity: 1; }
        30% { opacity: .8; }
        100% { transform: translate(var(--sdx, 40px), var(--sdy, -60px)) scale(0); opacity: 0; }
      }

      /* ═══ v5.10: MATH INSIGHT GLOW ENHANCED ═══ */
      @keyframes insightReveal {
        0% { opacity: 0; transform: translateY(8px) scale(0.95); max-height: 0; }
        30% { opacity: 1; max-height: 100px; }
        100% { transform: translateY(0) scale(1); max-height: 200px; }
      }
      .insight-card {
        position: relative;
        overflow: hidden;
      }
      .insight-card::before {
        content: '';
        position: absolute; top: 0; left: 0; right: 0; height: 1.5px;
        background: linear-gradient(90deg, transparent, rgba(167,139,250,.4), rgba(52,211,153,.3), transparent);
      }

      /* ═══ v5.10: MISSION COMPLETE BADGE ═══ */
      @keyframes missionBadgeReveal {
        0% { transform: scale(0) rotate(-180deg); opacity: 0; filter: brightness(3) drop-shadow(0 0 20px rgba(251,191,36,.8)); }
        40% { transform: scale(1.3) rotate(15deg); opacity: 1; filter: brightness(1.5) drop-shadow(0 0 16px rgba(251,191,36,.5)); }
        70% { transform: scale(0.9) rotate(-5deg); filter: brightness(1.1); }
        100% { transform: scale(1) rotate(0deg); filter: brightness(1) drop-shadow(0 0 8px rgba(251,191,36,.3)); }
      }

      /* ═══ v5.10: ENERGY CHARGE BAR ═══ */
      @keyframes energyCharge {
        0% { width: 0; box-shadow: none; }
        100% { width: var(--charge, 100%); box-shadow: 0 0 12px var(--charge-color, rgba(99,102,241,.4)); }
      }
      .energy-bar {
        height: 6px; border-radius: 3px;
        background: linear-gradient(90deg, var(--charge-from, #6366f1), var(--charge-to, #a78bfa));
        animation: energyCharge 1s cubic-bezier(.4,0,.2,1) forwards;
        position: relative;
      }
      .energy-bar::after {
        content: '';
        position: absolute; top: 0; right: 0;
        width: 12px; height: 100%;
        border-radius: 0 3px 3px 0;
        background: rgba(255,255,255,.4);
        filter: blur(2px);
        animation: pulse 1.5s ease infinite;
      }

      /* ═══ v5.10: SMOOTH NUMBER TRANSITION ═══ */
      @keyframes numberSlotMachine {
        0% { transform: translateY(100%); opacity: 0; }
        60% { transform: translateY(-8%); opacity: 1; }
        80% { transform: translateY(3%); }
        100% { transform: translateY(0); opacity: 1; }
      }

      /* ═══ v5.10: AGE CARD MAGNETIC HOVER ═══ */
      .age-card {
        transition: all .3s cubic-bezier(.4,0,.2,1);
        position: relative;
        overflow: hidden;
      }
      .age-card:hover {
        transform: translateY(-4px) scale(1.025);
        box-shadow: 0 16px 48px var(--card-glow, rgba(0,0,0,.3)), 0 0 24px var(--card-glow, rgba(124,58,237,.15));
      }
      .age-card:active {
        transform: translateY(-1px) scale(0.98);
      }
      @keyframes planetCardReveal {
        0% { opacity: 0; transform: translateX(-20px) scale(0.95); }
        60% { transform: translateX(3px) scale(1.01); }
        100% { opacity: 1; transform: translateX(0) scale(1); }
      }

      /* ═══ v5.10: HOLOGRAPHIC FLICKER ═══ */
      @keyframes hologramFlicker {
        0%, 94%, 100% { opacity: 1; }
        95% { opacity: .7; }
        97% { opacity: 1; }
        98% { opacity: .85; }
      }

      /* ═══ v5.10: MISSION PULSE RING ═══ */
      @keyframes missionPulseRing {
        0% { transform: scale(1); opacity: .6; }
        100% { transform: scale(1.15); opacity: 0; }
      }

      /* ═══ v5.10: SUPERNOVA FLASH — perfect score ═══ */
      @keyframes supernovaFlash {
        0% { transform: scale(0.8); opacity: 0; filter: brightness(3); text-shadow: 0 0 40px rgba(251,191,36,.8); }
        30% { transform: scale(1.1); opacity: 1; filter: brightness(1.5); }
        50% { transform: scale(0.95); filter: brightness(1.2); }
        100% { transform: scale(1); opacity: 1; filter: brightness(1); }
      }

      /* ═══ v5.10: PLANET ARRIVAL — briefing screen ═══ */
      @keyframes planetArrival {
        0% { transform: scale(0) translateY(-20px); opacity: 0; filter: brightness(3) blur(4px); }
        30% { transform: scale(1.2) translateY(5px); opacity: 1; filter: brightness(1.5) blur(0); }
        60% { transform: scale(0.9) translateY(-3px); }
        100% { transform: scale(1) translateY(0); filter: brightness(1); }
      }

      /* ═══ v5.10: STAR RAIN ═══ */
      @keyframes starRain {
        0% { opacity: 0; transform: translateY(0) translateX(0) rotate(-35deg); }
        5% { opacity: .8; }
        100% { opacity: 0; transform: translateY(60px) translateX(80px) rotate(-35deg); }
      }

      /* ═══ v5.10: COMPASS SPIN ═══ */
      @keyframes compassSpin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      /* ═══ v5.10: NEBULA PULSE ═══ */
      @keyframes nebulaPulse {
        0%, 100% { opacity: .6; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.08); }
      }

      /* ═══ GalakSay Pro — Design System Animations ═══ */
      @keyframes meteorShoot {
        0%, 90%, 100% { opacity: 0; transform: translateX(0) translateY(0); }
        2% { opacity: 1; }
        8% { opacity: 0; transform: translateX(300px) translateY(150px); }
      }
      @keyframes starTwinkle {
        0%, 100% { opacity: 0.3; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1.2); }
      }

      /* ═══ ERİŞİLEBİLİRLİK — GALAKSAY PRO ═══ */

      /* prefers-reduced-motion: Tüm dekoratif animasyonları durdur */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      /* Kullanıcı ayarı: azaltılmış hareket */
      body.galaksay-reduced-motion *, body.galaksay-reduced-motion *::before, body.galaksay-reduced-motion *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.05ms !important;
      }

      /* Büyük metin modu — %130 ölçekleme */
      body.galaksay-large-text {
        font-size: 130% !important;
      }
      body.galaksay-large-text button,
      body.galaksay-large-text input,
      body.galaksay-large-text select {
        min-height: calc(var(--galaksay-touch-scale, 1) * 48px);
        font-size: inherit;
      }

      /* Yüksek kontrast modu */
      body.galaksay-high-contrast {
        --contrast-boost: 1.3;
      }
      body.galaksay-high-contrast * {
        border-color: rgba(255,255,255,.25) !important;
      }
      body.galaksay-high-contrast button:focus-visible,
      body.galaksay-high-contrast [role="switch"]:focus-visible,
      body.galaksay-high-contrast a:focus-visible,
      body.galaksay-high-contrast [tabindex]:focus-visible {
        outline: 3px solid #FFD93D !important;
        outline-offset: 2px !important;
      }

      /* Renk körlüğü modları — SVG filtre alternatifleri */
      body.galaksay-colorblind-protanopia { filter: url('#colorblind-protanopia'); }
      body.galaksay-colorblind-deuteranopia { filter: url('#colorblind-deuteranopia'); }
      body.galaksay-colorblind-tritanopia { filter: url('#colorblind-tritanopia'); }

      /* ═══ KAPSÜL ERİŞİLEBİLİRLİK DESENLERİ — Renk körlüğü desteği ═══ */
      /* Bilgi sadece renkle iletilmez — her kapsül değerine farklı desen */
      /* Aktifleştirme: body.galaksay-colorblind-* veya .capsule-patterns sınıfı */
      body.galaksay-colorblind-protanopia .capsule-pattern,
      body.galaksay-colorblind-deuteranopia .capsule-pattern,
      body.galaksay-colorblind-tritanopia .capsule-pattern,
      .capsule-patterns .capsule-pattern {
        position: relative;
        overflow: hidden;
      }
      .capsule-patterns .capsule-pattern::after,
      body[class*="galaksay-colorblind"] .capsule-pattern::after {
        content: '';
        position: absolute;
        inset: 0;
        opacity: 0.35;
        pointer-events: none;
        border-radius: inherit;
      }
      /* 1=düz (beyaz — desen yok) */
      /* 2=yatay çizgi (kırmızı) */
      .capsule-pattern[data-value="2"]::after {
        background: repeating-linear-gradient(0deg, transparent, transparent 3px, currentColor 3px, currentColor 4px);
      }
      /* 3=dikey çizgi (yeşil) */
      .capsule-pattern[data-value="3"]::after {
        background: repeating-linear-gradient(90deg, transparent, transparent 3px, currentColor 3px, currentColor 4px);
      }
      /* 4=noktalı (mor) */
      .capsule-pattern[data-value="4"]::after {
        background: radial-gradient(circle 1.5px, currentColor 100%, transparent 100%);
        background-size: 6px 6px;
      }
      /* 5=çapraz çizgi (sarı) */
      .capsule-pattern[data-value="5"]::after {
        background: repeating-linear-gradient(45deg, transparent, transparent 3px, currentColor 3px, currentColor 4px);
      }
      /* 6=dama (koyu yeşil) */
      .capsule-pattern[data-value="6"]::after {
        background: repeating-conic-gradient(currentColor 0% 25%, transparent 0% 50%) 50% / 6px 6px;
      }
      /* 7=zikzak (siyah) */
      .capsule-pattern[data-value="7"]::after {
        background: repeating-linear-gradient(-45deg, transparent, transparent 3px, currentColor 3px, currentColor 4px);
      }
      /* 8=dalga (kahverengi) */
      .capsule-pattern[data-value="8"]::after {
        background: repeating-linear-gradient(0deg, transparent, transparent 2px, currentColor 2px, currentColor 3px, transparent 3px, transparent 6px);
        transform: skewX(15deg);
      }
      /* 9=artı (mavi) */
      .capsule-pattern[data-value="9"]::after {
        background:
          repeating-linear-gradient(0deg, transparent, transparent 4px, currentColor 4px, currentColor 5px),
          repeating-linear-gradient(90deg, transparent, transparent 4px, currentColor 4px, currentColor 5px);
        background-size: 8px 8px;
      }
      /* 10=yıldız/x-çizgi (turuncu) */
      .capsule-pattern[data-value="10"]::after {
        background:
          repeating-linear-gradient(45deg, transparent, transparent 3px, currentColor 3px, currentColor 4px),
          repeating-linear-gradient(-45deg, transparent, transparent 3px, currentColor 3px, currentColor 4px);
      }

      /* Focus görünürlüğü — klavye navigasyonu */
      :focus-visible {
        outline: 2px solid #6C63FF;
        outline-offset: 2px;
      }

      /* Landscape uyarısı — küçük telefonlarda */
      @media (max-height: 400px) and (orientation: landscape) {
        body::after {
          content: 'Lütfen cihazınızı dikey çevirin';
          position: fixed; inset: 0;
          z-index: 999999;
          background: #0B0E2D;
          color: #A8B2D1;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 18px;
          font-weight: 700;
          font-family: 'Nunito', system-ui, sans-serif;
          text-align: center;
          padding: 20px;
        }
      }

      /* Safe area — notch destekli cihazlar */
      body {
        padding-top: env(safe-area-inset-top, 0);
        padding-bottom: env(safe-area-inset-bottom, 0);
        padding-left: env(safe-area-inset-left, 0);
        padding-right: env(safe-area-inset-right, 0);
      }
    </style>
  </head>
